# ═══════════════════════════════════════════════════════════════════════
# Cryptoniumpay — Multi-Host Docker Swarm (High Availability)
# ═══════════════════════════════════════════════════════════════════════
#
# Deploy across 2+ machines with automatic failover.
# If one node dies, services automatically restart on surviving nodes.
#
# Setup:
#   1. On MAIN node:   docker swarm init --advertise-addr <MAIN_IP>
#   2. On OTHER nodes:  docker swarm join --token <TOKEN> <MAIN_IP>:2377
#   3. Deploy:          docker stack deploy -c docker-compose.swarm.yml cryptoniumpay
# ═══════════════════════════════════════════════════════════════════════

version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptoniumpay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cryptoniumpay}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
        window: 120s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptoniumpay}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 192M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: cryptoniumpay-api:latest
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    env_file:
      - ./backend.env
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
        window: 120s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - exports:/data/exports

  worker:
    image: cryptoniumpay-api:latest
    depends_on:
      - db
      - redis
    command: ["node", "dist/main"]
    env_file:
      - ./backend.env
    environment:
      ENABLE_WATCHER: "true"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 384M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
    volumes:
      - exports:/data/exports

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: any

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  exports:
    driver: local