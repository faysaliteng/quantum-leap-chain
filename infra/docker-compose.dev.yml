# Cryptoniumpay — Development Docker Compose
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cryptoniumpay
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: cryptoniumpay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptoniumpay"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://cryptoniumpay:devpassword@db:5432/cryptoniumpay?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production-min-64-chars-long-xxxxxxxxx
      CORS_ORIGINS: http://localhost:5173
      ENABLE_WATCHER: "false"
      NODE_ENV: development
    volumes:
      - exports:/data/exports

volumes:
  pgdata:
  exports:
